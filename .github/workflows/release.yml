name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish or refresh, for example v0.3.0
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-release:
    name: windows-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Resolve package metadata
        id: meta
        shell: pwsh
        run: |
          $manualTag = "${{ inputs.release_tag }}"

          if ($manualTag -ne "") {
            $version = $manualTag
          } elseif ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "") {
            $version = "${{ github.ref_name }}"
          } else {
            $match = Select-String -Path Cargo.toml -Pattern '^version = "(.+)"$' | Select-Object -First 1
            if (-not $match) {
              throw "Unable to resolve package version from Cargo.toml"
            }
            $version = "v" + $match.Matches[0].Groups[1].Value
          }

          $package = "meetai-$version-windows-x86_64"
          $standaloneExe = "meetai.exe"
          $versionedExe = "$package.exe"
          $zipSha = "$package.zip.sha256"
          "version=$version" >> $env:GITHUB_OUTPUT
          "package=$package" >> $env:GITHUB_OUTPUT
          "zip_name=$package.zip" >> $env:GITHUB_OUTPUT
          "standalone_exe_name=$standaloneExe" >> $env:GITHUB_OUTPUT
          "versioned_exe_name=$versionedExe" >> $env:GITHUB_OUTPUT
          "zip_sha_name=$zipSha" >> $env:GITHUB_OUTPUT

      - name: Package release files
        id: package
        shell: pwsh
        run: |
          $package = "${{ steps.meta.outputs.package }}"
          $stage = Join-Path $env:RUNNER_TEMP $package
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "${{ steps.meta.outputs.zip_name }}"
          $zipShaPath = Join-Path $env:GITHUB_WORKSPACE "${{ steps.meta.outputs.zip_sha_name }}"
          $standaloneExePath = Join-Path $env:GITHUB_WORKSPACE "${{ steps.meta.outputs.standalone_exe_name }}"
          $versionedExePath = Join-Path $env:GITHUB_WORKSPACE "${{ steps.meta.outputs.versioned_exe_name }}"

          if (Test-Path $stage) {
            Remove-Item -LiteralPath $stage -Recurse -Force
          }

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          if (Test-Path $zipShaPath) {
            Remove-Item -LiteralPath $zipShaPath -Force
          }

          if (Test-Path $standaloneExePath) {
            Remove-Item -LiteralPath $standaloneExePath -Force
          }

          if (Test-Path $versionedExePath) {
            Remove-Item -LiteralPath $versionedExePath -Force
          }

          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item -LiteralPath "target\release\meetai.exe" -Destination (Join-Path $stage "meetai.exe") -Force
          Copy-Item -LiteralPath "README.md" -Destination (Join-Path $stage "README.md") -Force
          Copy-Item -LiteralPath "LICENSE" -Destination (Join-Path $stage "LICENSE") -Force
          Copy-Item -LiteralPath "target\release\meetai.exe" -Destination $standaloneExePath -Force
          Copy-Item -LiteralPath "target\release\meetai.exe" -Destination $versionedExePath -Force

          Compress-Archive -Path $stage -DestinationPath $zipPath -CompressionLevel Optimal

          $sha = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath $zipShaPath -Value ($sha + ' *' + [System.IO.Path]::GetFileName($zipPath)) -NoNewline

          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "zip_sha_path=$zipShaPath" >> $env:GITHUB_OUTPUT
          "standalone_exe_path=$standaloneExePath" >> $env:GITHUB_OUTPUT
          "versioned_exe_path=$versionedExePath" >> $env:GITHUB_OUTPUT

      - name: Resolve release notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $customNotes = Join-Path $env:GITHUB_WORKSPACE ".github\release-notes\$version.md"
          $fallbackNotes = Join-Path $env:RUNNER_TEMP "release-notes-$version.md"

          if (Test-Path $customNotes) {
            $bodyPath = $customNotes
          } else {
            $fallbackBody = @(
              "## 更新说明",
              "",
              "本次发布包含 Windows 可直接下载使用的 `meetai.exe`，以及包含说明文档的完整压缩包。",
              "",
              "## 下载内容",
              "",
              "- `meetai.exe`",
              "- `${{ steps.meta.outputs.versioned_exe_name }}`",
              "- `${{ steps.meta.outputs.zip_name }}`",
              "- `${{ steps.meta.outputs.zip_sha_name }}`"
            )
            Set-Content -LiteralPath $fallbackNotes -Value $fallbackBody
            $bodyPath = $fallbackNotes
          }

          "body_path=$bodyPath" >> $env:GITHUB_OUTPUT

      - name: Smoke test version output
        run: .\target\release\meetai.exe --version

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package }}
          path: |
            ${{ steps.package.outputs.standalone_exe_path }}
            ${{ steps.package.outputs.versioned_exe_path }}
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.zip_sha_path }}

      - name: Publish GitHub release
        if: (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && startsWith(inputs.release_tag, 'v'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: MeetAI ${{ steps.meta.outputs.version }}
          body_path: ${{ steps.notes.outputs.body_path }}
          overwrite_files: true
          files: |
            ${{ steps.package.outputs.standalone_exe_path }}
            ${{ steps.package.outputs.versioned_exe_path }}
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.zip_sha_path }}
